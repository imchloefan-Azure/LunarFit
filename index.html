<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LunarFit - 节律画布</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p-color: #ff6b81; --f-color: #7bed9f; --o-color: #eccc68; --l-color: #70a1ff;
            --p-pre-bg: rgba(255, 107, 129, 0.2); --f-pre-bg: rgba(123, 237, 159, 0.2);
            --o-pre-bg: rgba(236, 204, 104, 0.2); --l-pre-bg: rgba(112, 161, 255, 0.2);
            --bg: #f8f9fa; --text: #2f3542;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
        }

        .left-panel { width: 42%; min-width: 340px; border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; }
        .right-panel { flex: 1; padding: 35px; overflow-y: auto; background: #fff; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px 0; }

        .day-wrapper { padding: 4px 0; display: flex; justify-content: center; align-items: center; position: relative; height: 68px; }
        .day {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; position: relative; z-index: 2;
        }
        .day-num { font-weight: 700; margin-bottom: 4px; }
        .day.selected { outline: 2px solid var(--text); outline-offset: -2px; border-radius: 12px !important; z-index: 5; background: rgba(255,255,255,0.2); }

        .phase-bg { position: absolute; top: 2px; bottom: 2px; left: 0; right: 0; z-index: 1; }
        .act-p { background: var(--p-color); color: white !important; }
        .pre-p { background: var(--p-pre-bg); border: 1px dashed var(--p-color); }
        .pre-f { background: var(--f-pre-bg); }
        .pre-o { background: var(--o-pre-bg); }
        .pre-l { background: var(--l-pre-bg); }

        .round-left { border-top-left-radius: 34px; border-bottom-left-radius: 34px; left: 5px; }
        .round-right { border-top-right-radius: 34px; border-bottom-right-radius: 34px; right: 5px; }
        .round-all { border-radius: 34px; left: 5px; right: 5px; }

        /* 图标放大 */
        .day-sports { display: flex; gap: 3px; justify-content: center; align-items: center; min-height: 20px; }
        .mini-icon { font-size: 14px !important; display: inline-block; }

        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: block; }
        .sport-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 15px; }
        .s-card { padding: 15px 5px; border: 2px solid #f1f2f6; border-radius: 18px; text-align: center; cursor: pointer; transition: 0.2s; }
        .s-card.active { border-color: var(--text); background: #f8f9fa; }
        .s-card i, .s-card span { display: block; font-size: 26px; margin-bottom: 8px; }

        .btn-main { background: var(--text); color: #fff; width: 100%; padding: 20px; border: none; border-radius: 18px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .period-toggle { padding: 15px; border-radius: 15px; background: #f1f2f6; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-weight: 600; }
        .period-toggle.active { background: var(--p-color); color: white; }

        textarea { width: 100%; border: 1px solid #eee; border-radius: 18px; padding: 15px; font-size: 16px; background: #fafafa; margin-top: 15px; }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow: auto; }
            .left-panel, .right-panel { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <h1 style="margin:0">LunarFit</h1>
        <p style="color:#a4b0be; font-size:13px; margin:5px 0 25px 0;">顺应周期的丝带流线视图</p>

        <div class="cal-header">
            <button onclick="changeMonth(-1)" style="border:none;background:none;font-size:24px;cursor:pointer;">❮</button>
            <strong id="monthDisplay"></strong>
            <button onclick="changeMonth(1)" style="border:none;background:none;font-size:24px;cursor:pointer;">❯</button>
        </div>

        <div class="cal-grid" id="calGrid"></div>
        <div id="phaseAdvice"></div>
    </div>

    <div class="right-panel">
        <div style="margin-bottom:30px;">
            <span class="section-title" id="dateLabel">选择日期</span>
            <div class="period-toggle" id="periodBtn" onclick="togglePeriod()">
                <i class="fas fa-droplet"></i> 标记为月经期
            </div>
        </div>

        <div style="margin-bottom:30px;">
            <span class="section-title">今日运动</span>
            <div class="sport-picker" id="sportPicker">
                <div class="s-card" data-s="力量训练" data-i="fa-dumbbell"><i class="fas fa-dumbbell"></i>力量</div>
                <div class="s-card" data-s="拳课" data-i="fa-hand-fist"><i class="fas fa-hand-fist"></i>拳课</div>
                <div class="s-card" data-s="跳舞" data-i="fa-music"><i class="fas fa-music"></i>跳舞</div>
                <div class="s-card" data-s="游泳" data-i="fa-person-swimming"><i class="fas fa-person-swimming"></i>游泳</div>
                <div class="s-card" data-s="跑步" data-i="fa-person-running"><i class="fas fa-person-running"></i>跑步</div>
                <div class="s-card" data-s="攀岩" data-i="fa-mountain"><i class="fas fa-mountain"></i>攀岩</div>
                <div class="s-card" data-s="羽毛球" data-i="🏸"><span>🏸</span>羽球</div>
            </div>
        </div>

        <textarea id="noteBox" rows="4" placeholder="今天的感觉如何？"></textarea>
        <button class="btn-main" onclick="saveData()">保存记录</button>
        <p style="text-align:center; color:#ccc; font-size:11px; margin-top:15px;">数据存储占用: <span id="storageSize">0</span> KB</p>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('lFit_v6')) || { ap: [], lg: {}, cy: 28 };
        let viewingDate = new Date();
        let selectedDate = new Date().toISOString().split('T')[0];

        const ADVICE = {
            p: { n: "月经期", c: "var(--p-color)", t: "修复性运动，专注内省。" },
            f: { n: "卵泡期", c: "var(--f-color)", t: "能量回升，适合攻克新知识。" },
            o: { n: "排卵期", c: "var(--o-color)", t: "巅峰状态，适合竞技与表达。" },
            l: { n: "黄体期", c: "var(--l-color)", t: "宜温和有氧，处理细致任务。" }
        };

        function init() {
            renderCal();
            loadDate(selectedDate);
            updateStorageSize();
        }

        // --- 核心改进：智能状态判断逻辑 ---
        function getStatus(dStr) {
            // 1. 实录绝对优先
            if (db.ap.includes(dStr)) return { t: 'act', p: 'p' };
            if (db.ap.length === 0) return null;

            // 2. 找到该日期之前的最近一个“月经起始日”
            let sortedStarts = getPeriodStarts().sort().reverse();
            let lastStartStr = sortedStarts.find(s => s <= dStr);
            
            if (!lastStartStr) {
                // 如果在所有记录之前，尝试用第一个记录往前推预测（可选），这里先返回空
                return null;
            }

            let lastStart = new Date(lastStartStr);
            let target = new Date(dStr);
            let diff = Math.floor((target - lastStart) / 86400000);
            
            // 重点：如果日期就在最近一次手动标记的 10 天内
            if (diff < 15) {
                // 如果 diff < 7 且用户没标记，我们保持空白（不预测红色），除非是推算其他阶段
                if (diff < 7) return null; // 7天内不预测红色，交给用户手动标记
                if (diff < 13) return { t: 'pre', p: 'f' }; // 7-13天预测卵泡期
                return { t: 'pre', p: 'o' }; // 14-15天预测排卵期
            }

            // 3. 未来周期预测
            let dayInCycle = diff % db.cy;
            if (dayInCycle < 5) return { t: 'pre', p: 'p' }; // 只有进入下一个周期才预测浅红
            if (dayInCycle < 13) return { t: 'pre', p: 'f' };
            if (dayInCycle < 16) return { t: 'pre', p: 'o' };
            return { t: 'pre', p: 'l' };
        }

        function getPeriodStarts() {
            let sorted = [...db.ap].sort();
            if (sorted.length === 0) return [];
            let starts = [sorted[0]];
            for (let i = 1; i < sorted.length; i++) {
                if ((new Date(sorted[i]) - new Date(sorted[i-1])) / 86400000 > 8) {
                    starts.push(sorted[i]);
                }
            }
            return starts;
        }

        function renderCal() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            document.getElementById('monthDisplay').innerText = `${viewingDate.getFullYear()}年${viewingDate.getMonth()+1}月`;

            const firstDay = new Date(viewingDate.getFullYear(), viewingDate.getMonth(), 1).getDay();
            const lastDate = new Date(viewingDate.getFullYear(), viewingDate.getMonth()+1, 0).getDate();

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d<=lastDate; d++) {
                const dStr = formatDate(viewingDate.getFullYear(), viewingDate.getMonth(), d);
                const wrapper = document.createElement('div');
                wrapper.className = 'day-wrapper';
                
                const status = getStatus(dStr);
                if(status) {
                    const bg = document.createElement('div');
                    bg.className = `phase-bg ${status.t}-${status.p}`;
                    
                    const prevS = getStatus(formatDate(viewingDate.getFullYear(), viewingDate.getMonth(), d-1));
                    const nextS = getStatus(formatDate(viewingDate.getFullYear(), viewingDate.getMonth(), d+1));
                    
                    const isStart = !prevS || prevS.p !== status.p || (firstDay + d - 1) % 7 === 0;
                    const isEnd = !nextS || nextS.p !== status.p || (firstDay + d - 1) % 7 === 6;

                    if(isStart && isEnd) bg.classList.add('round-all');
                    else if(isStart) bg.classList.add('round-left');
                    else if(isEnd) bg.classList.add('round-right');
                    wrapper.appendChild(bg);
                }

                const el = document.createElement('div');
                el.className = `day ${dStr === selectedDate ? 'selected' : ''}`;
                if(status && status.t === 'act') el.style.color = '#fff';
                el.innerHTML = `<span class="day-num">${d}</span>`;
                
                const log = db.lg[dStr];
                if(log && log.sp && log.sp.length > 0) {
                    const sContainer = document.createElement('div');
                    sContainer.className = 'day-sports';
                    log.sp.slice(0, 3).forEach(s => {
                        sContainer.innerHTML += (s.i.startsWith('fa-')) ? 
                            `<i class="fas ${s.i} mini-icon"></i>` : `<span class="mini-icon">${s.i}</span>`;
                    });
                    el.appendChild(sContainer);
                }

                wrapper.onclick = () => { selectedDate = dStr; renderCal(); loadDate(dStr); };
                wrapper.appendChild(el);
                grid.appendChild(wrapper);
            }
        }

        function loadDate(dStr) {
            document.getElementById('dateLabel').innerText = dStr;
            const log = db.lg[dStr] || { sp: [], n: "" };
            document.getElementById('periodBtn').classList.toggle('active', db.ap.includes(dStr));
            document.getElementById('noteBox').value = log.n || "";
            
            document.querySelectorAll('.s-card').forEach(card => {
                card.classList.toggle('active', log.sp?.some(x => x.s === card.dataset.s));
                card.onclick = () => {
                    let lg = db.lg[selectedDate] || { sp: [], n: "" };
                    const idx = lg.sp.findIndex(x => x.s === card.dataset.s);
                    if(idx > -1) lg.sp.splice(idx, 1);
                    else if(lg.sp.length < 3) lg.sp.push({ s: card.dataset.s, i: card.dataset.i });
                    db.lg[selectedDate] = lg;
                    renderCal(); loadDate(selectedDate);
                };
            });

            const status = getStatus(dStr);
            const advArea = document.getElementById('phaseAdvice');
            if(status) {
                const info = ADVICE[status.p];
                advArea.innerHTML = `<div style="margin-top:20px; padding:18px; border-radius:18px; background:${info.c}15; border-left:6px solid ${info.c}">
                    <strong style="color:${info.c}">${info.n} (${status.t==='act'?'已校准':'预测'})</strong><br>
                    <small style="opacity:0.8">${info.t}</small></div>`;
            }
        }

        function togglePeriod() {
            const idx = db.ap.indexOf(selectedDate);
            if(idx > -1) db.ap.splice(idx, 1);
            else db.ap.push(selectedDate);
            save(); renderCal(); loadDate(selectedDate);
        }

        function saveData() {
            if(!db.lg[selectedDate]) db.lg[selectedDate] = { sp: [] };
            db.lg[selectedDate].n = document.getElementById('noteBox').value;
            save(); alert("记录已保存"); updateStorageSize();
        }

        function save() { localStorage.setItem('lFit_v6', JSON.stringify(db)); }
        function changeMonth(s) { viewingDate.setMonth(viewingDate.getMonth() + s); renderCal(); }
        function formatDate(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
        function updateStorageSize() {
            const size = (JSON.stringify(db).length / 1024).toFixed(2);
            document.getElementById('storageSize').innerText = size;
        }

        init();
    </script>
</body>
</html>
