<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LunarFit - 身体报告与节律看板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p-color: #ff6b81; --f-color: #7bed9f; --o-color: #eccc68; --l-color: #70a1ff;
            --p-pre: rgba(255, 107, 129, 0.15); --f-pre: rgba(123, 237, 159, 0.2);
            --o-pre: rgba(236, 204, 104, 0.2); --l-pre: rgba(112, 161, 255, 0.2);
            --bg: #f8f9fa; --text: #2f3542;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* 布局 */
        .left-panel { width: 42%; min-width: 360px; border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; position: relative; }
        .right-panel { flex: 1; padding: 35px; overflow-y: auto; background: #fff; }

        /* 同步按钮 */
        .sync-btn { position: absolute; top: 20px; right: 20px; background: #fff; border: 1.5px solid #eee; border-radius: 12px; padding: 8px 12px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; z-index: 100; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 80%; }
        .weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 10px; }
        .weekday { text-align: center; font-size: 11px; font-weight: 700; color: #a4b0be; text-transform: uppercase; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px 0; }
        .day-wrapper { padding: 4px 0; display: flex; justify-content: center; align-items: center; position: relative; height: 75px; }
        .day { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; position: relative; z-index: 2; }
        .day-num { font-weight: 700; margin-bottom: 5px; }
        .day.selected { outline: 2px solid var(--text); outline-offset: -2px; border-radius: 12px !important; z-index: 5; background: rgba(255,255,255,0.3); }

        .phase-bg { position: absolute; top: 2px; bottom: 2px; left: 0; right: 0; z-index: 1; transition: 0.2s; }
        .act-p { background: var(--p-color); color: white !important; }
        .pre-f { background: var(--f-pre); }
        .pre-o { background: var(--o-pre); }
        .pre-l { background: var(--l-pre); }
        .pre-p { background: var(--p-pre); border: 1px dashed var(--p-color); }

        .round-left { border-top-left-radius: 36px; border-bottom-left-radius: 36px; left: 5px; }
        .round-right { border-top-right-radius: 36px; border-bottom-right-radius: 36px; right: 5px; }
        .round-all { border-radius: 36px; left: 5px; right: 5px; }

        .day-sports { display: flex; gap: 3px; justify-content: center; align-items: center; min-height: 20px; }
        .mini-icon { font-size: 14px !important; }

        .section-title { font-size: 18px; font-weight: 700; margin: 25px 0 12px 0; display: block; }
        .sport-picker, .level-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .s-card, .l-card { padding: 12px 5px; border: 2px solid #f1f2f6; border-radius: 15px; text-align: center; cursor: pointer; font-size: 13px; background: white; }
        .active { border-color: var(--text) !important; background: #f8f9fa !important; font-weight: 600; }
        .s-card i, .s-card span { display: block; font-size: 24px; margin-bottom: 6px; }

        .p-btn { flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #f1f2f6; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; background: white; }
        .on-start { background: var(--p-color); border-color: var(--p-color); color: white; }
        .on-end { background: var(--text); border-color: var(--text); color: white; }

        textarea { width: 100%; border: 1px solid #eee; border-radius: 18px; padding: 15px; font-size: 16px; background: #fafafa; margin-top: 10px; }
        .btn-main { background: var(--text); color: #fff; width: 100%; padding: 20px; border: none; border-radius: 18px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 25px; }
        .btn-report { background: #5e6ad2; color: white; margin-top: 15px; }

        /* 报告遮罩层样式 */
        #reportOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .report-modal {
            background: #fff; width: 100%; max-width: 700px; max-height: 90vh;
            border-radius: 24px; overflow-y: auto; padding: 40px; position: relative;
        }
        .close-report { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #ccc; }
        .report-header { text-align: center; border-bottom: 2px solid #f8f9fa; padding-bottom: 20px; margin-bottom: 25px; }
        .report-section { margin-bottom: 30px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .report-stat-card { background: #f8f9fa; padding: 15px; border-radius: 16px; }
        .stat-val { font-size: 24px; font-weight: 800; color: #5e6ad2; }
        .trend-up { color: #ff6b81; font-size: 12px; }
        .trend-down { color: #7bed9f; font-size: 12px; }
        .advice-pill { background: #5e6ad215; border-left: 4px solid #5e6ad2; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow: auto; }
            .left-panel, .right-panel { width: 100%; height: auto; border: none; }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <button class="sync-btn" onclick="syncToiOSCalendar()"><i class="far fa-calendar-plus"></i> 同步到日历</button>
        <h1 style="margin:0">LunarFit</h1>
        <div class="cal-header" style="margin-top:10px;">
            <button onclick="changeMonth(-1)" style="border:none;background:none;font-size:24px;cursor:pointer;">❮</button>
            <strong id="monthDisplay"></strong>
            <button onclick="changeMonth(1)" style="border:none;background:none;font-size:24px;cursor:pointer;">❯</button>
        </div>
        <div class="weekday-row">
            <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
            <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div id="phaseAdvice"></div>
    </div>

    <div class="right-panel">
        <span class="section-title" id="dateLabel" style="margin-top:0">选择日期</span>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="p-btn" id="startBtn" onclick="toggleBound('start')"><i class="fas fa-play"></i> 开始日</button>
            <button class="p-btn" id="endBtn" onclick="toggleBound('end')"><i class="fas fa-stop"></i> 结束日</button>
        </div>
        <span class="section-title">流量感</span>
        <div class="level-picker" id="flowPicker">
            <div class="l-card" data-v="0">无</div><div class="l-card" data-v="1">少</div><div class="l-card" data-v="2">中</div><div class="l-card" data-v="3">多</div>
        </div>
        <span class="section-title">痛感程度</span>
        <div class="level-picker" id="painPicker">
            <div class="l-card" data-v="0">无痛</div><div class="l-card" data-v="1">轻微</div><div class="l-card" data-v="2">明显</div><div class="l-card" data-v="3">剧烈</div>
        </div>
        <span class="section-title">今日运动</span>
        <div class="sport-picker" id="sportPicker">
            <div class="s-card" data-s="力量" data-i="fa-dumbbell"><i class="fas fa-dumbbell"></i>力量</div>
            <div class="s-card" data-s="拳课" data-i="fa-hand-fist"><i class="fas fa-hand-fist"></i>拳课</div>
            <div class="s-card" data-s="跳舞" data-i="fa-music"><i class="fas fa-music"></i>跳舞</div>
            <div class="s-card" data-s="游泳" data-i="fa-person-swimming"><i class="fas fa-person-swimming"></i>游泳</div>
            <div class="s-card" data-s="跑步" data-i="fa-person-running"><i class="fas fa-person-running"></i>跑步</div>
            <div class="s-card" data-s="攀岩" data-i="fa-mountain"><i class="fas fa-mountain"></i>攀岩</div>
            <div class="s-card" data-s="羽球" data-i="🏸"><span>🏸</span>羽球</div>
        </div>
        <textarea id="noteBox" rows="3" placeholder="写下身体记录..."></textarea>
        <button class="btn-main" onclick="saveData()">保存今日数据</button>
        <button class="btn-main btn-report" onclick="generateReport()"><i class="fas fa-chart-line"></i> 生成本月身体智慧报告</button>
    </div>

    <!-- 报告模态框 -->
    <div id="reportOverlay">
        <div class="report-modal">
            <i class="fas fa-times close-report" onclick="closeReport()"></i>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('lFit_v15')) || { cycles: [], lg: {}, cy: 28 };
        let viewingDate = new Date();
        let selectedDate = new Date().toISOString().split('T')[0];

        const ADVICE = {
            p: { n: "月经期 (P1)", c: "var(--p-color)", t: "修复性运动，建议：瑜伽、冥想。" },
            f: { n: "卵泡期 (P2)", c: "var(--f-color)", t: "能量回升。建议：力量训练、攻克难题。" },
            o: { n: "排卵期 (P3)", c: "var(--o-color)", t: "激素巔峰。建议：竞技运动、社交活动。" },
            l: { n: "黄体期 (P4)", c: "var(--l-color)", t: "宜温和有氧。建议：有氧耐力、整理复习。" }
        };

        function init() { calculateAvgCycle(); renderCal(); loadDate(selectedDate); setupPickers(); }

        function calculateAvgCycle() {
            if (db.cycles.length < 2) return db.cy = 28;
            let starts = db.cycles.map(c => new Date(c.s)).sort((a,b) => a-b);
            let intervals = [];
            for(let i=1; i<starts.length; i++) {
                let diff = (starts[i] - starts[i-1]) / 86400000;
                if(diff >= 20 && diff <= 45) intervals.push(diff);
            }
            if(intervals.length > 0) db.cy = Math.round(intervals.reduce((a,b)=>a+b) / intervals.length);
        }

        function getStatus(dStr) {
            const target = new Date(dStr); const L = db.cy;
            for (let c of db.cycles) {
                const s = new Date(c.s); const e = c.e ? new Date(c.e) : null;
                if (e && target >= s && target <= e) return { t: 'act', p: 'p' };
                if (!e && target.getTime() === s.getTime()) return { t: 'act', p: 'p' };
            }
            const pastCycles = db.cycles.filter(c => new Date(c.s) < target).sort((a,b) => new Date(b.s) - new Date(a.s));
            if (pastCycles.length > 0) {
                const lastS = new Date(pastCycles[0].s);
                const dayOfCycle = Math.floor((target - lastS) / 86400000) + 1;
                const futureDay = ((dayOfCycle - 1) % L) + 1;
                if (futureDay <= 5) return { t: 'pre', p: 'p' };
                if (futureDay <= (L/2 - 2)) return { t: 'pre', p: 'f' };
                if (futureDay <= (L/2 + 1)) return { t: 'pre', p: 'o' };
                return { t: 'pre', p: 'l' };
            }
            return null;
        }

        // --- 核心报告生成逻辑 ---
        function generateReport() {
            const year = viewingDate.getFullYear();
            const month = viewingDate.getMonth();
            const curMonthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
            const lastMonthKey = month === 0 ? `${year-1}-12` : `${year}-${String(month).padStart(2, '0')}`;

            const analyze = (mKey) => {
                const logs = Object.keys(db.lg).filter(k => k.startsWith(mKey)).map(k => ({...db.lg[k], date: k}));
                const sportsCount = {};
                let totalPain = 0, totalFlow = 0, daysLogged = logs.length;
                logs.forEach(l => {
                    (l.sp || []).forEach(s => sportsCount[s.s] = (sportsCount[s.s] || 0) + 1);
                    totalPain += parseInt(l.p || 0);
                    totalFlow += parseInt(l.f || 0);
                });
                return {
                    count: daysLogged,
                    avgPain: daysLogged ? (totalPain / daysLogged).toFixed(1) : 0,
                    avgFlow: daysLogged ? (totalFlow / daysLogged).toFixed(1) : 0,
                    sports: sportsCount,
                    totalWorkouts: Object.values(sportsCount).reduce((a,b)=>a+b, 0)
                };
            };

            const cur = analyze(curMonthKey);
            const prev = analyze(lastMonthKey);

            // 智能建议逻辑
            let advice = "本月你的身体节律表现稳定。";
            if (cur.avgPain > prev.avgPain && cur.avgPain > 1.5) {
                advice = "注意：本月平均痛感有所上升。通过记录发现，你在黄体后期（P4）的运动频率较高，建议下月该阶段增加皮质醇调节类运动（如散步、拉伸）。";
            } else if (cur.totalWorkouts > prev.totalWorkouts) {
                advice = "干得漂亮！本月运动效率显著提升。数据显示你精准抓住了卵泡期（P2）的能量窗口。";
            }

            const html = `
                <div class="report-header">
                    <h2>LunarFit 身体智慧报告</h2>
                    <p style="color:#888">${year}年${month+1}月总结</p>
                </div>
                <div class="report-section">
                    <h3 class="section-title"><i class="fas fa-activity"></i> 核心指标趋势</h3>
                    <div class="report-grid">
                        <div class="report-stat-card">
                            <p>平均痛感 (0-3)</p>
                            <span class="stat-val">${cur.avgPain}</span>
                            <span class="${cur.avgPain > prev.avgPain ? 'trend-up' : 'trend-down'}">
                                ${cur.avgPain > prev.avgPain ? '↑' : '↓'} 较上月
                            </span>
                        </div>
                        <div class="report-stat-card">
                            <p>累计运动次数</p>
                            <span class="stat-val">${cur.totalWorkouts}</span>
                            <span class="trend-down">较上月 ${cur.totalWorkouts - prev.totalWorkouts > 0 ? '+' : ''}${cur.totalWorkouts - prev.totalWorkouts}</span>
                        </div>
                    </div>
                </div>
                <div class="report-section">
                    <h3 class="section-title"><i class="fas fa-dumbbell"></i> 运动分布分析</h3>
                    <div class="advice-pill" style="background:white; border:1px solid #eee">
                        ${Object.entries(cur.sports).length > 0 ? 
                            Object.entries(cur.sports).map(([n, c]) => `<span>${n}: ${c}次</span>`).join(' | ') : 
                            '本月暂无运动记录'}
                    </div>
                </div>
                <div class="report-section">
                    <h3 class="section-title"><i class="fas fa-lightbulb"></i> 节律规划建议</h3>
                    <div class="advice-pill">${advice}</div>
                </div>
                <button class="btn-main" onclick="closeReport()">返回看板</button>
            `;
            document.getElementById('reportContent').innerHTML = html;
            document.getElementById('reportOverlay').style.display = 'flex';
        }

        function closeReport() { document.getElementById('reportOverlay').style.display = 'none'; }

        // --- 基础功能逻辑保持 ---
        function syncToiOSCalendar() {
            let icsContent = ["BEGIN:VCALENDAR","VERSION:2.0","CALSCALE:GREGORIAN","METHOD:PUBLISH"];
            let today = new Date();
            for (let i = -5; i < 30; i++) {
                let d = new Date(today); d.setDate(today.getDate() + i);
                let dStr = d.toISOString().split('T')[0];
                let status = getStatus(dStr); let icsDate = dStr.replace(/-/g, "");
                if (status) { icsContent.push("BEGIN:VEVENT", `SUMMARY:LunarFit: ${ADVICE[status.p].n}`, `DTSTART;VALUE=DATE:${icsDate}`, `DTEND;VALUE=DATE:${icsDate}`, `DESCRIPTION:${ADVICE[status.p].t}`, "END:VEVENT"); }
                let log = db.lg[dStr];
                if (log && log.sp && log.sp.length > 0) {
                    let sName = log.sp.map(s => s.s).join(",");
                    icsContent.push("BEGIN:VEVENT", `SUMMARY:🏃 LunarFit运动: ${sName}`, `DTSTART;VALUE=DATE:${icsDate}`, `DTEND;VALUE=DATE:${icsDate}`, `DESCRIPTION:备注: ${log.n || "无"}`, "END:VEVENT");
                }
            }
            icsContent.push("END:VCALENDAR");
            const blob = new Blob([icsContent.join("\r\n")], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.href = url; link.download = "LunarFit_Calendar.ics";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            alert("同步文件已准备好！请点击Safari下载箭头导入日历。");
        }

        function renderCal() {
            const grid = document.getElementById('calGrid'); grid.innerHTML = '';
            document.getElementById('monthDisplay').innerText = `${viewingDate.getFullYear()}年${viewingDate.getMonth()+1}月`;
            const firstDay = new Date(viewingDate.getFullYear(), viewingDate.getMonth(), 1).getDay();
            const lastDate = new Date(viewingDate.getFullYear(), viewingDate.getMonth()+1, 0).getDate();
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=lastDate; d++) {
                const dStr = formatDate(viewingDate.getFullYear(), viewingDate.getMonth(), d);
                const wrapper = document.createElement('div'); wrapper.className = 'day-wrapper';
                const status = getStatus(dStr);
                if(status) {
                    const bg = document.createElement('div'); bg.className = `phase-bg ${status.t}-${status.p}`;
                    const prevS = getStatus(formatDate(viewingDate.getFullYear(), viewingDate.getMonth(), d-1));
                    const nextS = getStatus(formatDate(viewingDate.getFullYear(), viewingDate.getMonth(), d+1));
                    const isStart = !prevS || prevS.p !== status.p || (firstDay + d - 1) % 7 === 0;
                    const isEnd = !nextS || nextS.p !== status.p || (firstDay + d - 1) % 7 === 6;
                    if(isStart && isEnd) bg.classList.add('round-all'); else if(isStart) bg.classList.add('round-left'); else if(isEnd) bg.classList.add('round-right');
                    wrapper.appendChild(bg);
                }
                const el = document.createElement('div'); el.className = `day ${dStr === selectedDate ? 'selected' : ''}`;
                if(status && status.t === 'act') el.style.color = '#fff';
                el.innerHTML = `<span class="day-num">${d}</span>`;
                const log = db.lg[dStr];
                if(log && log.sp) {
                    const sContainer = document.createElement('div'); sContainer.className = 'day-sports';
                    log.sp.forEach(s => { sContainer.innerHTML += s.i.startsWith('fa-') ? `<i class="fas ${s.i} mini-icon"></i>` : `<span class="mini-icon">${s.i}</span>`; });
                    el.appendChild(sContainer);
                }
                wrapper.onclick = () => { selectedDate = dStr; renderCal(); loadDate(dStr); };
                wrapper.appendChild(el); grid.appendChild(wrapper);
            }
        }

        function toggleBound(type) {
            let current = db.cycles.find(c => { const d = new Date(selectedDate); const s = new Date(c.s); return Math.abs(d - s) < 20 * 86400000; });
            if (type === 'start') { if (current) { current.s = (current.s === selectedDate) ? "" : selectedDate; if (!current.s && !current.e) db.cycles = db.cycles.filter(c => c !== current); } else { db.cycles.push({ s: selectedDate, e: null }); } }
            else { if (current) { current.e = (current.e === selectedDate) ? null : selectedDate; } else { alert("请先标记起始日"); return; } }
            db.cycles = db.cycles.filter(c => c.s); calculateAvgCycle(); save(); renderCal(); loadDate(selectedDate);
        }

        function setupPickers() {
            document.querySelectorAll('.l-card').forEach(c => { c.onclick = () => { c.parentElement.querySelectorAll('.l-card').forEach(x => x.classList.remove('active')); c.classList.add('active'); }; });
            document.querySelectorAll('.s-card').forEach(c => { c.onclick = () => { c.classList.toggle('active'); if(document.querySelectorAll('.s-card.active').length > 3) c.classList.remove('active'); syncSports(); renderCal(); }; });
        }

        function loadDate(dStr) {
            document.getElementById('dateLabel').innerText = dStr;
            const log = db.lg[dStr] || { sp: [], n: "", f: 0, p: 0 };
            const cycle = db.cycles.find(c => c.s === dStr || c.e === dStr);
            document.getElementById('startBtn').className = 'p-btn ' + (cycle && cycle.s === dStr ? 'on-start' : '');
            document.getElementById('endBtn').className = 'p-btn ' + (cycle && cycle.e === dStr ? 'on-end' : '');
            document.getElementById('noteBox').value = log.n || "";
            document.querySelectorAll('.l-card, .s-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('#flowPicker .l-card').forEach(c => c.classList.toggle('active', c.dataset.v == log.f));
            document.querySelectorAll('#painPicker .l-card').forEach(c => c.classList.toggle('active', c.dataset.v == log.p));
            document.querySelectorAll('.s-card').forEach(c => c.classList.toggle('active', log.sp?.some(s => s.s === c.dataset.s)));
            const status = getStatus(dStr);
            const advArea = document.getElementById('phaseAdvice');
            if(status) { const info = ADVICE[status.p]; advArea.innerHTML = `<div style="margin-top:20px; padding:18px; border-radius:18px; background:${info.c}15; border-left:6px solid ${info.c}"><strong>${info.n}</strong><br><small style="opacity:0.8">${info.t}</small></div>`; }
            else { advArea.innerHTML = ""; }
        }

        function syncSports() { if(!db.lg[selectedDate]) db.lg[selectedDate] = { sp: [], n: "", f: 0, p: 0 }; db.lg[selectedDate].sp = Array.from(document.querySelectorAll('.s-card.active')).map(c => ({s: c.dataset.s, i: c.dataset.i})); }
        function saveData() { syncSports(); db.lg[selectedDate].f = document.querySelector('#flowPicker .active')?.dataset.v || 0; db.lg[selectedDate].p = document.querySelector('#painPicker .active')?.dataset.v || 0; db.lg[selectedDate].n = document.getElementById('noteBox').value; save(); alert("已保存记录"); renderCal(); }
        function save() { localStorage.setItem('lFit_v15', JSON.stringify(db)); }
        function changeMonth(s) { viewingDate.setMonth(viewingDate.getMonth() + s); renderCal(); }
